body:
  text: 提要海野詞詞曲類一詞集之屬臣等謹案海野詞一卷宋曽覿撰覿字純甫號海野老農汴人紹興中以閣門祇候為建王內知客孝宗初除權知閣門事淳熙中除開府儀同三司加少保醴泉觀使事迹具宋史佞幸傳馬端臨經籍考載覿海野詞一卷與此本合覿頗有文藻孝宗潛邸嘗與觴詠唱酬卷首水龍吟後闋有云攜手西園宴罷下瑶臺醉魂初醒即紀承寵遊宴之事故用飛蓋西園故實以後嘗侍宴應制如阮郎歸賦燕栁梢青賦栁諸詞亦皆其時所作覿又嘗見東都之盛故奉使過京作金人捧露盤邯鄲道上作憶秦娥重到臨安作感皇恩等曲黃升花菴詞選謂其語多感慨凄然有黍離之悲雖與龍大淵朋比作姦為清流所不齒而衡其才華實屬可觀過而存之亦選唐詩者不遺崔湜宗楚客例也審齋詞詞曲類一詞集之屬臣等謹案審齋詞一卷宋王千秋撰千秋字錫老審齋其號也東平人陳振孫書録解題載審齋詞一卷而不詳其始末據卷內有夀韓南澗生日及席上贈梁次張二詞南澗名元吉隆興間為吏部尚書次張名安世淳熙中為桂林轉運使是千秋為孝宗時人矣惟安世詩稱千秋為金陵耆舊與陳振孫所稱為東平人不合或流寓於金陵耶毛晉跋稱其詞多酬賀之作然生日嘏詞南宋人集中皆有何獨刻責於千秋况其體本花間而出入於東坡門徑風格秀拔要自不雜俚音南渡後亦卓然為一作手黃升中興詞選不見採録或偶未見其本耳晉跋遽以絶少綺艷評之亦殊未允集中如憶秦娥清平樂好事近虞美人點綘唇以及詠花諸作短歌微吟興復不淺何必屯田樂章始為情語也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
