body:
  text: 海野詞宋曾覿撰水龍吟楚天千里無雲露華洗出秋容淨銀蟾臺榭玉壺天地參差桂影鴛瓦寒生畫簷光射碧梧金井聽韶華半夜江梅三弄風嫋嫋良宵永㩦手西園宴罷下瑤臺醉魂初醒吹簫仙子驂鸞歸路一襟清興鳷鵲樓髙建章門逈星河耿耿看滄江潮上丹楓葉落浸闗山冷念奴嬌霽天湛碧正新涼風露氷壺清徹河漢無聲囗囗囗湧出銀蟾孤絶岩桂香飄井梧影轉冷浸宫袍潔西廂往事一簾幽夢淒切腸斷楚峽雲歸樽前無緒只有愁如髪此夕姮娥應也恨冷落瓊樓金闕禁漏迢迢邊鴻杳杳宻意憑誰説闌干星漢落梅三弄初闋又席上賦林檎花羣花漸老向曉來㣲雨芳心初拆拂掠嬌紅香旖旎渾欲不勝春色淡月梨花新晴繁杏裝㸃成標格風光都在半開深院人寂剛要買斷東風裊欒枝低映舞茵歌席記得當時曾共賞玉人纎手輕摘醉裏妖嬈醒時風韵比並堪端的誰知顦顇對花空恁思憶又賞芍藥人生行樂算一春歡賞都來㡬日綠暗紅稀春已去贏得星星頭白醉裏狂歌花前起舞􅂸罰金盃百淋漓宫錦忍辜妖豔姿色須信殿得韶光秪愁花謝又作經年别嫰紫嬌紅還解語應為主人留客月落烏啼酒闌燭暗離緒傷呉越竹西歌吹不堪老去重憶又余年十八寓符離臨行作此詞媚容素態比羣花贏了風流顔色昵枕低幃銷受得囗囗輕怜深惜怎望如今瓶沉簮折驀地成疎隔囗囗夕雨甚時重見蹤跡門外暫泊蘭舟一行霜樹囗一重山碧淚眼相看争忍望天際孤村寒驛汴水無情催人東去去也添愁寂鱗鴻方便為人傳箇消息瑞鶴仙賞雪陡寒生翠幕凍雲垂繽紛飛雪初落縈風度池閣嫋餘妍時趂舞腰纎弱江天漠漠認殘梅吹散畫角正貂裘乍怯黄昏院宇入簷飄泊依約銀河迢逓種玉羣仙共驂鸞鶴東君未覺先春綻萬花蕚向樽前已喜豐年呈瑞人間何事最樂擁笙歌繡閤低帷縱歡細酌傾盃樂仙㠯雪席上賞錦帳寒添畫簷雀噪凍雲布野望空際瑤峰㣲吐瓊花初綻江山如畫裁氷剪水裝鴛瓦杳旗亭路依稀管絃臺榭倚小樓佳興一行珠簾不下隨縷板歌聲閒暇傍翠袖雲鬟怜豔冶似佯醉不耐嬌羞濃歡旋學風雅向暝色雙鸞舞罷紅獸㬉春生金斚但殢飲香霧捲壺天不夜木蘭花慢長樂臺晚望偶成正枝頭茘子晚紅皺裊薫風對碧瓦迷雲青山似浪返照浮空髙臺稱吟晀處繁華清勝兩兩無窮簾捲榕隂暮合萬家香靄溟濛年光冉冉逐飛鴻嘆雨跡雲蹤漸暑退蘭房涼生象簟知與誰同臨鸞晚粧初罷怨清宵好夢不相逢看即天涯秋也恨隨一葉梧桐水調歌頭書懐溪山多勝事詩酒辦清游主人為我增葺臺榭足凝眸髣髴玉壺天地隱見瀛洲風月千首傲王侯誰與共登晀公子氣横秋記當年曾共醉庾公樓一盃此際重話前事逐東流多謝兼金清唱更擬重陽佳節挼菊任扶頭但願身長健浮世􅂸悠悠又圖畫上麟閣莫使鬢先秋壯年豪氣無奈黯黯陣雲浮常記青油幕下一矢聊城飛去談笑靖邊頭勛業出無意非為快恩讎巻龍韜隨鳯詔與時謀朱旛皂蓋南下聊試海山州邂逅故人相見俯仰浮生今古螻蟻共王侯萬事偶然耳風月恣嬉遊又和南劎薛倅長樂富山水杖屨足追遊故人千里西望雙劎黯迴眸多謝扁舟椉興慰我天涯覉思何必羡封侯莫雨疎簾捲爽氣颯如秋送征鴻浮大白倚危樓參横月落耿耿河漢近人流堪嘆人生離合後日征鞍西去别語却從頭老矣江邊路清興漫悠悠醉蓬萊侍宴徳夀宫應制賦假山向逍遙物外造化工夫做成幽致杳靄壺天映滿空蒼翠聳秀峰巒媚春花木對玉階金砌方丈瀛洲非煙非霧恍移平地况值良辰宴遊時候日永風和莫春天氣金母龜臺傍碧桃隂裏地久天長父堯子舜燦綺羅佳㑹一部仙韶九重鸞仗年年同醉滿庭芳賞牡丹冶態輕盈香風搖蕩畫欄淑景初長彩霞深處明豔奪昭陽試問沉香舊事應勸我莫負韶光多情是低徊顧影雲幕淡㣲涼人間春更好一枝斜挿猶記疎狂到如今潘鬢暗㸃呉霜樂事直須年少何妨􅂸一醉千觴醺醺醉壺天向晚春思正悠揚燕山亭中秋諸王席上作河漢風清庭戸夜涼皓月澄秋時候氷鑑乍開跨海飛來光掩滿天星斗四捲珠簾漸移影寳階鴛甃還又看嵗嵗嬋娟向人依舊朱邸髙宴簮纓正歌吹瑤臺舞翻宫袖銀管競酧棣蕚相輝風流古來誰有玉笛横空更聽徹霓裳三奏難偶􅂸醉倒參横曉漏又楊亷訪生日玉立明光才業冠倫漢厯方承休運江左奏功塞壘宣威紫綬㡬埀金印嵗晚歸來望丹極新清氛䘲忠憤著撓節朋儔便成嘉遯千載雲海茫茫記舉目新亭壯懐難盡蝴蝶夢驚化鶴飛還榮華等閒一瞬七十樽前算疇昔都無可恨休問長占取朱顔緑鬢沁園春初冬夜坐聞淮上㨗音次韵更漏迢迢乍寒天氣畫燭對床正井梧飄砌邊鴻度月故人何處水逺山長老去功名年來情緒寛盡寒衣銷舊香除非是仗蠻牋象管時伴吟窗詞章莫話行藏且喜見㨗書來帝鄉看鋭師雲合妖氛電埽隋堤宫柳依舊成行夢遶他年青門紫陌對酒花前歌正當空成恨奈潘郎兩鬢新㸃呉霜喜遷鶯福唐平蕩海寇宴犒將士席上作七閩形勝鎮南紀㑹府山川交映簫鼔喧天綺羅盈市不負四時風景共喜太平無事豈料潢池不逞殄羣醜看一鼔雷奔滄溟波静指縱詩書帥曾到鳯池宻勿陪㡬政蹔淹籌幃催分戰艦總出智謀先定想見㨗書初上盡道臣賢主聖正圖舊聽重宣丹詔歸調金鼎金人捧露盤庚寅嵗春奉使過京師感懷作記神京繁華地舊遊蹤正御溝春水溶溶平康巷陌繡鞍金勒躍青驄解衣沽酒醉絃管柳緑花紅到如今餘霜鬢嗟前事夢魂中但寒煙滿目飛蓬雕欄玉砌空餘三十六離宫塞笳驚起莫天雁寂寞東風傳言玉女鳯闕龍樓清夜月華初照萬㸃星毬䕶花梢寒峭華胥夢裏老去歡情終少花愁醉悶總消除了紫陌嬉遊不似少年懐抱珠簾十里聽笙簫聲杳幽期宻約暗想淺顰輕笑良時莫負玉山頻倒好事近仰賡聖製搖颺杏花風遲日淡隂雙闕絲管緩隨檀板看舞腰迴雪龍舟閒艤畫橋邊須趂好花折頻勸御盃宜滿正清歌初闋又嚴陵柳守席上一夢别長安山路雨斜風細行到子陵灘畔謝主人深意多情低唱下梁塵􅂸十分沈醉去也為伊消瘦悄不禁思憶又霽雪好風光恰是相逢時節酒量不禁頻勸便醉倒人側嚴城更漏夜猒猒應有斷腸客莫問落梅三弄喜一枝曾折柳梢青侍宴禁中賀張知閤應制作梅粉輕匀和風布㬉芳徑無塵鳯閣凌虛龍池澄碧芳意鱗鱗清時酒聖花神對内苑風光又新一部仙韶九重鸞仗天上長春又臨安春㑹泛舟湖中胡帥索詞因賦花柳爭春湖山競秀恰近清明綺席從容蘭舟搖曵穩泛波平君恩許宴簮纓宻座深杯多故情一部清音兩行紅粉醉入嚴城又山林堂席上以主人之意解嘲品雅風流端端正正堪人怜惜因甚新來眉兒不展愁情如織倡條冶葉無情猶為他千思萬憶據恁當初真心實意如何虧得春光好侍宴苑中賞杏花臙脂膩粉光輕正新晴枝上閙紅無處著近清明仙娥進酒多情向花下相勸盈盈不惜十分傾玉斚惜凋零又感舊心下事不思量自難忘花底夢迴春漠漠恨偏長閒日多少韶光雕闌静芳草池塘風急落紅留不住又斜陽又槐隂宻蔗漿寒荔枝丹珍重主人怜客意薦雕盤多情翠袖凭欄晚粧罷誰與同歡簾捲玉鈎風細細歛眉山減字木蘭花席上賞宴賜牡丹之作一聲杜宇滿地落紅愁不語國色春嬌不逐風前柳絮飄珠簾休捲愛惜龍香藏粉豔勝友俱來同醉君恩倒玉盃㸃絳唇慶即席上璧月香風萬家簾幕煙如晝閙蛾雪柳人似梅花瘦行樂清時莫惜笙歌奏更闌後滿斟金斗且醉厭厭酒又細雨斜風上元燈火還空過下簾孤坐老去知因果風月詞情冷落教誰和今忘我静中看破萬事空花墮浣溪沙春韶次韻張池州賞杏聽琵琶豔杏紅芳透粉肌沉香亭宴太真妃新晴庭館燕來遲試抺么絃粧半掩滿斟緑醑袖交飛九重天上捧金巵又鄭相席上贈舞者元是昭陽宫裏人驚鴻宛轉掌中身只疑飛過洞庭雲按徹涼州蓮步𦂳好花風裊一枝新畫堂香㬉不勝春又綺陌尋芳惜少年長楸走馬著金鞭玉樓春醉杏花前顦顇如今誰作伴别離還近養花天碧雲凝處憶嬋娟又一扇熏風入座涼輕雲㣲雨弄晴光緑團梅子未成黄漸近日長愁悶處更堪羇旅送歸艎亂山重叠水茫茫釵頭鳯向誤作清商怨華燈閙銀蟾照萬家羅幕香風透金樽側花顔色醉裏人人向人情極惜惜惜春寒峭腰肢小鬢雲斜嚲蛾兒裊清宵寂香閨隔好夢難尋雨蹤雲跡憶憶憶訴𠂻情夜直殿廬晚雪因作花菴作宫怨建章宫殿晚生寒飛雪㸃朱䦨舞腰緩隨檀板輕絮殢春閒愁思亂酒腸慳漏將殘玉人今夜滴粉搓酥應歛眉山又趙徳夫還延平因語舊遊作此以贈之半鈎珠箔小揚州春色在重樓曾醉玳筵歌舞楚夢苦難留情脉脉恨悠悠㡬時休大都人世㑹少離多總是閒愁又晚粧初試蕋珠宫隨步異香濃檀槽緩垂鸞帶纎指撚春蔥鶯語巧上林中正嬌慵暫教花下簾影㣲開多謝東風又史丞相宴曲水席上作蘭亭曲水擅風流移宴向清秋黄花未應顦顇盞面尚堪浮圍豔質發歌喉細相酧明年此㑹主人還是在鳯池頭轉調踏莎行翠幄成隂誰家簾幙綺羅香擁處觥籌錯清和將近春寒更薄髙歌看簌簌梁塵落好景良辰人生行樂金盃無奈是苦相虐殘紅飛盡裊垂楊輕弱來年斷不負鶯花約眼兒媚閨思花近清明晚風寒錦幄獸香殘醺醺醉裏囱囱相見重聽哀彈春情入指鶯聲碎危柱不勝絃十分得意一塲輕夢淡月欄杆又重勸離觴淚相看寂寞上征鞍臨行欲話風流心事萬緒千端春光漫漫人千里歸夢遶長安不堪向晚孤城吹角囘首闗山蝶戀花惜春翠箔垂雲香噴霧年少疎狂載酒尋芳路多少惜花春意緒勸人金盞歌金縷桃杏飄零風景暮只有閒愁不逐流年去舊事而今誰共語畫樓空指行雲處又三月上已應制御柳風柔春正㬉紫殿朱樓赫奕祥光逺十二玉龍迎鳯輦香騰錦繡聞絃管扇却雙鸞開寳宴緑遶紅圍宣勸金巵滿萬嵗千秋留寵眷此身欲備昭陽燕隔浦蓮詠白蓮涼秋湖上過雨作意囘商素暗緑翻輕葢蕭然姑射儔侣粧臉宜淡佇紅衣妬步襪凌波去異香度天教占斷風汀月浦煙渚纎塵不到夢遶玉壺清處多少芳心待怨訴無語飛來一片鷗鷺浪淘沙觀潮作一線海門來雪噴雲開崑山移玉下瑤臺捲地西風吹不斷直到蓬萊羯鼓噪春雷鼉舞蛟囘歌樓鼔吹夕陽催今古清愁流不盡都一罇罍驀山溪坤寧殿得㫖次韻賦照水梅花催花小雨輕把香塵洒簾捲水亭風梅影轉夕陽初下靚粧窺鑑鴛甃湛清漪浮暗麝剪芳瓊消得連城價玉樓十二寒怯銖衣掛曾是緑華仙眷餘情新詞如畫花隨人聖須信世無雙騰鳯吹駐鑾轝堪與瑤池亞又暮秋賞梨花凋紅減翠正是清秋杪深院嫋香風看梨花一枝開早瓏璁映面依約認嬌顰天淡淡月溶溶春意知多少清明池館芳信年年好更向五侯家把江梅風光占了休教寂寞辜負向人心檀板響寳盃傾潘鬢從他老感皇恩重到臨安依舊惜春心花枝常好只恐樽前被花笑少年青鬢耐得㡬番重到舊歡重記省如天杳綺陌青門斜陽芳草今古銷沉送人老帝城春事又是等閒來了亂紅隨過雨鶯聲悄阮郎歸上苑初夏侍宴池上雙飛新燕掠水而去得㫖賦之柳隂庭館占風光呢喃清晝長碧波新漲小池塘雙雙蹴水忙萍散漫絮飄颺輕盈體態狂為憐流去落紅香銜將歸畫梁鷓鴣天選徳殿賞燈先宴梅堂侍兩官沾醉口占龍馭親迎玉輦來江梅枝上雪成堆東風上苑春光到更放金蓮匝地開騰鳯吹進瑤盃兩宫交勸正歡諧父慈子孝從今數凖擬開筵一萬迴又奉和伯可郎中席上見贈桃李飄零春已深可憐輕負惜花心樽前賴有紅千叠窗外休驚緑滿林燈灼灼醉沉沉笙歌叢裏酒頻斟留歡且莫囱囱去悵望春歸何處尋又了堂浄惠師示予寒食感懐二闋因次其韻陌上春泥向曉乾花間幽鳥舞姍姍年華不管人將老門外東風依舊寒投簮易息機難鹿門歸路不曾闗羡君早覺無生法識破南柯一夢閒又故鄉寒食醉􅋳顔鞦韆綵索眩斕斑如今頭上灰三斗贏得疎慵到處閒鐘已動漏將殘浮生猶恨别離難鑊湯轉作清涼地只在人心􅄼様看定風波應制聽琵琶作捍撥金泥雅製新紫檀槽映小腰身婭姹雛鶯相對語欣覩上林花底㬉生春颯颯胡沙飛指下休訝一般竒絶稱精神向道曲終多少意須記昭陽殿裏舊承恩又賞牡丹席上走筆上苑穠芳初雨晴香風嫋嫋泛軒楹猶記洛陽開小宴嬌面粉光依約認傾城流落江南重此㑹相對金蕉蘸甲十分傾怕見人間春更好向道如今老去尚多情又題續宅江樓極目秋光夕照開潮頭初自海門來杳杳江天横一線如練疾驅千騎鼓聲催傑檻翠飛争徙倚囗囗一行新雁去仍迴翠袖半空歌笑迥低映十分沉醉勸金盃又天語丁寧對未央少攄素志向荆襄烜赫家聲今不墜英偉風姿颯爽紫髯郎别酒一盃君莫阻囗囗燭前粉豔儼成行領畧大堤花好處無緒也應囘首水雲鄉南鄉子文叔開樽席上作花菴作别意霜月晚雲收蕭瑟西風滿院秋雅㑹難期嗟易散遲留把酒聽歌且勸酬萬事􅂸悠悠只有情親意未休後夜扁舟煙浪裏囘頭葉葉丹楓總是愁憶秦娥晴空碧呉山染就丹青色丹青色西風搖落可堪淒惻世情冷煗君應識鬢邊各自侵尋白侵尋白江南江北幾時歸得又西風節碧雲捲盡秋宵月秋宵月闗河千里照人離别樽前俱是天涯客􅄼堪三載遙相憶遙相憶年光依舊漸成華髪又賞雪席上莫雲蹙小亭帶雪斟醽醁斟醽醁一聲羌管落梅蔌蔌舞衣旋趂霓裳曲倚闌相對人如玉人如玉錦屏羅幌看成不足又正飛雪園林一様梨花白梨花白畫堂簾捲㬉生春色嵇康轉軸聲幽噎新來多病嬌無力嬌無力淺紅轉黛自然標格又邯鄲道上望叢臺有感風蕭瑟邯鄲古道傷行客傷行客繁華一瞬不堪思憶叢臺歌舞無消息金樽玉管空陳跡空陳跡連天草樹莫雲凝碧鵲橋仙同舍郎載酒見過醉後作菊花小摘西風斜照簾影輕籠暝色玉樽側倒莫辭空滿座賓朋囗弁側鄉邦萬里北來年少㡬箇如今在得扶頭一任且留連歎人世光隂半百清平樂松姿不老獨立蓬萊杪風捲流蘇香霧曉又是江梅開了丹青早畫麒麟貂蟬自屬王門聞道碧桃花綻一枝枝祝千春長相思清夜長泛玉觴照座江梅花正芳風傳細細香圍豔粧留醉鄉一曲清歌聲遶梁樽前人斷腸虞美人中秋前兩夜作芙蓉池畔都開遍又是西風晚霽天碧浄暝雲收漸看一輪氷魄冷懸秋閩山層叠迷歸路把酒寛愁緒舊歡新恨幾淒涼暗想瀛洲何處夢悠揚採桑子清明清明池館晴還雨緑漲溶溶花裏遊蜂㝛粉栖香錦繡中玉簫聲斷人何處依舊春風萬㸃愁紅亂逐煙波總向東朝中措趙知閤生日畫堂簾捲獸香濃花上雪玲瓏平地十洲三島蟠桃已試春紅清朝舊徳仙姿難老主眷方隆爛醉笙歌叢裏年年先占春風又山父賞牡丹酒半作畫堂欄檻占韶光端不負年芳依倚東風向曉數行濃淡仙粧停盃醉折多情多恨冶豔真香只恐去為雲雨夢魂時惱襄王又金沙架上日璁瓏濃緑襯輕紅花下兩行紅袖直疑春在壺中如今尚覺惜花愛酒依舊情濃無限少年心緒從教醉倒東風又休論社燕與秋鴻時節太囱囱海上一番㣲雨朱門濃緑隂中主人情厚金盃滿泛且共從容莫問鶯花俱老今朝猶是春風又西湖南北舊遊空誰料一樽同囘首四年間事渾如飛絮濛濛林花謝了明年春到依舊芳容惟有朱顔緑鬢暗隨流水常東又席上贈南釰翟守雙溪樓上凭欄時㶑灩泛金巵醉倒閙花深處歌聲遏住雲飛風流太守鸞臺家世玉鑑丰姿行奉紫泥褒詔要看擊浪天池又維揚感懐雕車南陌碾香塵一夢尚如新囘首舊遊何在柳煙花霧迷春如今霜鬢愁停短棹懶傍清樽二十四橋風月尋思只有消魂又同前代御帶作功名雖未壓英游一種舊風流人世百年須到如今七十春秋當時帷幄貂璫貴重譽藹朋儔贏得樽前沉醉浮華付去悠悠南柯子元夜書事璧月窺紅粉金蓮映綵山東風絲管滿長安移下十洲三島在人間兩兩人初散厭厭夜向闌倦粧殘醉􅀈輕寒手撚玉梅無緒倚欄杆又次韻南釰趙倅粉黛娉婷豔芝蘭笑語香延平春色鬭芬芳不管清宵更漏聽霓裳燭暗人方醉盃傳意更長可堪羇客九迴腸蕭瑟一簷風雨過横塘又將出行陸丈知府置酒出姬侍酒半索詞緑䕃侵簷淨紅榴照眼明主人開宴出傾城正是雨餘天氣暑風清别酒慇勤意危絃要妙聲年年相見豈無情後日莫雲囘首奈椉行又浩然與予同生己丑嵗月日時皆同秋日見席上出新詞且命小姬歌以俼觴次韻奉酬共禀隂陽數誰知造化工安閒百計總輸公掩映芙蓉花徑郡城東風月三秋興樽罍一笑同新詞佳麗見情通更喚雪兒低唱慰衰容玉樓春雪中無酒清坐寒冷承觀使太尉與賓客酧唱謹和江天暝色傷心目凍鵲争投林下竹四垂雲幕一襟寒片片飛花輕鏤玉美人試按新翻曲㸃破舞帬春草緑融樽側倒也思量清坐有人寒起粟江神子贈章䆳道故人情分轉綢繆小窗幽話離愁海闊天遙鴻雁兩悠悠今日相逢誰較健應怪我鬢先秋功名淅米在刀頭壯心休弊貂裘何事留歡不竟漾扁舟桃李春風將近也如後㑹醉青樓􅂿莎行和材甫聽彈琵琶作鳯翼雙雙金泥細細四絃斜抱攏纎指紫檀香㬉轉春雷嘈嘈切切聲相繼弱柳腰肢輕雲情思曲中多少風流事紅牙拍碎少年心可憐辜負樽前意生查子温柔鄉内人翠㣲閤中女顔笑洛陽花肌瑩荆山玉東君深有情解與花為主移傍楚峰居容易為雲雨青玉案蒲葵佳節初經雨正欄檻薰風度滿泛香蒲斟醁醑故人情厚豔歌嬌舞總是留賓處榴花照眼江天莫醉裏春情蕩輕絮豈止捲簾通一顧今宵酒醒一襟風露夢指髙唐去又椉鸞影裏氷輪度秋空淨南樓莫嫋嫋天風吹玉兔今宵只在舊時圓處往事難重數天涯㡬見新霜露怎得朱顔舊如故對酒臨風慵作賦藍橋煙浪故人千里夢也無由做菩薩鬘次韻龍深甫春日即事杏花寒食佳期近一簾煙雨琹書潤砌下水潺潺玉笙吹莫寒陽臺雲易散往事尋思嬾花底醉相扶當時人在無又雲煙漠漠秋容老茅簷映水人家好林葉未凋疎逺山横有無平生耕釣事若箇安身是勸君早歸來碧香新瓮開西江月元夕醉中走筆煥爛蓮燈髙下參差梅影横斜凭欄一目盡天涯雪月交輝清夜莫惜柔荑勸酒從教醉臉紅霞爛銀宫闕對仙家一段風光如畫又桂苑旋生涼思銀河左界秋髙纎塵不動湛清霄皓月照人偏好詩為情多却減酒因愁裏難銷一聲羌管夢魂勞可惜風光虛老又醉伴三千珠履如登十二瓊樓壺天澄爽露華秋灧灧金波釃酒羅扇不隨恩在佳時須要人酬麒麟閣畫為誰留只見浮生白首繡帶兒客路見梅瀟灑隴頭春取次一枝新還是東風來也猶作未歸人㣲月淡煙村謾佇立惆悵黄昏暮寒香細疎英㡬㸃儘耐銷魂卜算子湖州塼牆呉氏女失身于上山張氏作妾數盡萬般花不比梅花韵雪壓風欺恁地寒剗地清香噴半醉折歸來挿向烏雲鬢不是愁人悶帶花花帶愁人悶柳梢青詠海棠雨過風㣲温泉浴倦妃子粧遲翠袖牽雲朱唇得酒臉暈臙脂年年海燕新歸怎奈向黄昏恁時倚遍瓊干燒殘銀燭花又爭知又春祺錫宴囗杏堂前清深窗外宛似蓬瀛珠翠分行笙歌争奏音䪨清新玉皇金母情親勸醁醑更酬嗣君地久天長花朝月夕天上長春又小宴清秋霎時見了雨散雲收柳絮輕柔梅花閒澹宫院風流空教夢遶青樓待説箇相思又休無奈情何不來眼底常在心頭醉落魄情深恨切憶伊誚没些休歇百般做處百厮愜管是前生曾負你寃業臨岐不忍囱囱别兩行珠淚流紅頰闗山漸逺音書絶一箇心腸兩處對風月鵲橋仙嬌波媚靨樽前席上只是尋常梳裹温柔伶俐總天然没半搯教人看破從來可恁癡迷著相百計消除不過煙花不是不曾經放不下唯他一箇清平樂豔苞初拆偏借東君力上苑梨花風露溼新染臙脂顔色玉人小立簾櫳輕匀媚臉粧紅斜插一枝雲鬢看誰􅓑春風訴𠂻情閒窗静院漏聲長金鴨冷殘香㡬番夢囘枕上飛絮恨悠揚身在此意伊行㬠思量不言不語㡬許閒情月上囘廊浣溪沙櫻桃榖雨郊園喜弄晴滿林璀璨綴繁星筠籃新採絳珠傾樊素扇邊歌未發葛洪爐内藥初成金盤乳酪齒流氷壺中天慢此進御月詞也上皇大喜曰從來月詞不曾用金甌事可謂新竒賜金束帶紫畨羅水晶盌上亦賜寳盞至一㪅五㸃還宫是夜西興亦聞天樂焉素飇漾碧看天衢穩送一輪明月翠水瀛壺人不到比似世間秋别玉手瑤笙一時同色小按霓裳疊天津橋上有人偷記新闋當日誰幻銀橋阿瞞兒戲一笑成痴絶肯信羣仙髙晏處移下水晶宫闕雲海塵清山河影滿桂泠吹香雪何勞玉斧金甌千古無缺海野詞
